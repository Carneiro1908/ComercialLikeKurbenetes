name: "Terraform Infrastructure CI/CD"

# Trigger configured for manual activation with independent boolean inputs
on:
  workflow_dispatch:
    inputs:
      run_plan:
        description: 'Execute: Terraform Plan'
        required: false
        type: boolean
        default: true
      run_apply:
        description: 'Execute: Terraform Apply (Modifies AWS infrastructure)'
        required: false
        type: boolean
        default: false
      run_plan_destroy:
        description: 'Execute: Terraform Plan Destroy (Shows what will be deleted)'
        required: false
        type: boolean
        default: false
      run_destroy:
        description: 'Execute: Terraform Destroy (DELETES ALL AWS INFRASTRUCTURE)'
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: "Terraform Operations"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Terraform

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.5.7"

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::547320736290:role/github-actions-infra-role
        aws-region: eu-north-1
        audience: sts.amazonaws.com

    - name: Terraform Init
      run: terraform init

    - name: Terraform Validate
      run: terraform validate

    # 1. Runs if "Execute: Terraform Plan" checkbox is checked
    - name: Terraform Plan
      if: ${{ github.event.inputs.run_plan == 'true' }}
      run: terraform plan -input=false

    # 2. Runs if "Execute: Terraform Apply" checkbox is checked
    - name: Terraform Apply
      if: ${{ github.event.inputs.run_apply == 'true' }}
      run: terraform apply -auto-approve -input=false

    # 3. Runs if "Execute: Terraform Plan Destroy" checkbox is checked
    - name: Terraform Plan Destroy
      if: ${{ github.event.inputs.run_plan_destroy == 'true' }}
      run: terraform plan -destroy -input=false

    # 4. Runs if "Execute: Terraform Destroy" checkbox is checked
    - name: Terraform Destroy
      if: ${{ github.event.inputs.run_destroy == 'true' }}
      run: terraform destroy -auto-approve -input=false